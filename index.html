<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Weather App</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css" integrity="sha512-SzlrxWUlpfuzQ+pcUCosxcglQRNAq/DZjVsC0lE40xsADsfeQoEypE+enwcOiGjk/bSuGGKHEyjSoQ1zVisanQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <script defer src="main.js"></script>
    </head>
    <body>
        <div class="container">
            <input type="search" id="search" placeholder="Press enter after city name...">
            <div class="search-container">
                <div class="info">
                    <div class="cityAndTemp">
                        <p class="city-name">Stockholm</p>
                        <div class="weather">
                            <p class="temperature">30.2</p>
                        </div>
                    </div>
                    <div class="windAndHumid">
                        <div class="wind">
                            <p>19m/s</p>
                        </div>
                        <div class="humidity">
                            <p>92%</p>
                        </div>
                    </div>
                </div>
                <!-- <i class="mag-glass fa-solid fa-magnifying-glass fa-lg"></i> -->
            </div>
            
        </div>
    </body>
</html>
